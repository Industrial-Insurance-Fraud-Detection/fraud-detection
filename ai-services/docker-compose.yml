version: "3.9"

services:

  # ===============================
  # 🐰 RabbitMQ
  # ===============================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

  # ===============================
  # 🔍 Anomaly Detection Service
  # ===============================
  anomaly-service:
    build: ./ai-services/anomaly-service
    container_name: anomaly-service
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq
    restart: always

  # ===============================
  # 📊 Classification Service
  # ===============================
  classification-service:
    build: ./ai-services/classification-service
    container_name: classification-service
    ports:
      - "8002:8002"
    depends_on:
      - rabbitmq
    restart: always

  # ===============================
  # 📝 Text Service (NLP)
  # ===============================
  text-service:
    build: ./ai-services/text-service
    container_name: text-service
    ports:
      - "8003:8003"
    depends_on:
      - rabbitmq
    restart: always

  # ===============================
  # 👁 Vision Service
  # ===============================
  vision-service:
    build: ./ai-services/vision-service
    container_name: vision-service
    ports:
      - "8004:8004"
    depends_on:
      - rabbitmq
    restart: always

  # ===============================
  # ⚙️ Worker (RabbitMQ Consumer)
  # ===============================
  worker:
    build: ./ai-services/worker
    container_name: worker
    depends_on:
      - rabbitmq
    restart: always
