version: '3.8'

services:
  classification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: classification-service
    ports:
      - "8002:8002"
    volumes:
      # Persist trained model artifacts
      - ./models/classification/artifacts:/service/models/classification/artifacts
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped